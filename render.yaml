services:
  # Backend Service
  - type: web
    name: deployment-hub-api
    env: node
    region: singapore
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    autoDeploy: false

  # Frontend Service
  - type: static
    name: deployment-hub-web
    region: singapore
    plan: free
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: deployment-hub-api
          property: url
          envVarKey: VITE_API_URL # Render magic to append /api ? No, we need to handle this manually or in code
    autoDeploy: false
